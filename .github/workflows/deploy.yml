name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Cloudflare Worker
        run: |
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/e260b4133b9fd9640d2a06db81c01cc8/workers/scripts/gym-api-proxy" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/javascript" \
            --data-binary @- << 'WORKER'
          export default {
            async fetch(request, env) {
              if (request.method === 'OPTIONS') {
                return new Response(null, { headers: { 'Access-Control-Allow-Origin': '*', 'Access-Control-Allow-Methods': 'POST, OPTIONS', 'Access-Control-Allow-Headers': 'Content-Type' } })
              }
              const body = await request.json()
              const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': env.ANTHROPIC_KEY, 'anthropic-version': '2023-06-01' },
                body: JSON.stringify(body)
              })
              const data = await res.json()
              return new Response(JSON.stringify(data), { headers: { 'Access-Control-Allow-Origin': '*', 'Content-Type': 'application/json' } })
            }
          }
          WORKER
      - name: Set Worker Secret
        run: |
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/e260b4133b9fd9640d2a06db81c01cc8/workers/scripts/gym-api-proxy/secrets" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"name":"ANTHROPIC_KEY","text":"${{ secrets.VITE_ANTHROPIC_KEY }}","type":"secret_text"}'

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        run: npm install && npm run build
        env:
          VITE_ANTHROPIC_KEY: ${{ secrets.VITE_ANTHROPIC_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: gym-biniarz